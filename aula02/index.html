<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controles de Formulários</title>
</head>
<body>
    <h1>Preferências</h1>
    <form action="index.html" method="get">
        
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome">
        <br><br>
        <p>Qual turno você prefere estudar?</p>
        <input type="radio" id="manha" name="turno" value="Manhã">
        <label for="manha">Manhã</label>
        <br>
        <input type="radio" id="tarde" name="turno" value="Tarde">
        <label for="tarde">Tarde</label>
        <br>
        <input type="radio" id="noite" name="turno" value="Noite">
        <label for="noite">Noite</label>
        <br><br>
        <p>Quais áreas da tecnologia você tem interesse?</p>
        <input type="checkbox" id="programacao" name="interesse" value="Programação">
        <label for="programacao">Programação</label>
        <br>
        <input type="checkbox" id="design" name="interesse" value="Design">
        <label for="design">Design</label>
        <br>
        <input type="checkbox" id="banco" name="interesse" value="Banco de Dados">
        <label for="banco">Banco de Dados</label>
        <br>
        <input type="checkbox" id="redes" name="interesse" value="Redes">
        <label for="redes">Redes</label>
        <br><br>
        <label for="cor">Qual a sua cor favorita?</label>
        <input type="color" id="cor" name="cor">
        <br><br>
        <label for="satisfacao">Qual o seu nível de satisfação?</label>
        <input type="range" id="satisfacao" name="satisfacao" min="0" max="10">
        <br><br>
        <label for="horario">Qual o seu horário preferido?</label>
        <input type="time" id="horario" name="horario">
        <br><br>
        <label for="arquivo">Envie um arquivo</label>
        <input type="file" id="arquivo" name="arquivo">
        <br><br>
        <input type="submit" value="Cadastrar">
        <input type="reset" value="Limpar">
    </form>
</body>
</html>
