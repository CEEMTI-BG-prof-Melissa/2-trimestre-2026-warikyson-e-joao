<!DOCTYPE HTML>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Formulário HTML</title>
</head>

<body> 
  <h1>Cadastro de Usuário</h1>
  <form action="cadastro.php" method="POST">
    <label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome">
    <br>
    <label for="email">E-mail:</label>
    <input type="email" id="email" name="email">
    <br>
    <label for="senha">Senha:</label>
    <input type="password" id="senha" name="senha">
    <br>
    <label for="idade">Idade:</label>
    <input type="number" id="idade" name="idade">
    <br>
    <label for="nascimento">Data de nascimento:</label>
    <input type="date" id="nascimento" name="nascimento">
    <br>
    <p>Turno:</p>
    <input type="radio" name="turno" id="manha" value="manha">
    <label for="manha">Manhã</label>
    <input type="radio" name="turno" id="tarde" value="tarde">
    <label for="tarde">Tarde</label>
    <input type="radio" name="turno" id="noite" value="noite">
    <label for="noite">Noite</label>
    <br>
    <p>Áreas de interesse:</p>
    <input type="checkbox" name="area[]" id="programacao" value="programacao">
    <label for="programacao">Programação</label>
    <input type="checkbox" name="area[]" id="design" value="design">
    <label for="design">Design</label>
    <input type="checkbox" name="area[]" id="redes" value="redes">
    <label for="redes">Redes</label>
    <br><br>
    <input type="submit" value="Enviar">
    <input type="reset" value="Limpar">
  </form>
</body>
</html>
